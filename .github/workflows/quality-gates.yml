name: Quality Gates

# Reusable workflow: the single source of truth for "is this commit safe to
# ship." Called from both ci.yml (on pull_request) and deploy.yml (on push
# to main), so the exact same gates — including Lighthouse, Playwright, and
# SK translation completeness — run before anything reaches production, not
# just before a PR is approved.
on:
  workflow_call:

jobs:
  quality:
    name: Format · Typecheck · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run check
      - run: bun run build
        env:
          PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA

      # Ported from grow's (euhub-marketing) content-guard, which solves the
      # exact problem the old naive `grep -r dist/client/` version had here:
      # a raw substring grep over the whole dist/ tree (not just rendered
      # HTML) always false-positived on Tailwind's `::placeholder`/
      # `placeholder:` CSS and every real `<input placeholder="...">`
      # attribute - meaning it could never actually pass once any form
      # existed, and never caught anything real. This strips <script>/
      # <style>/comments/tags first, so it only checks visible rendered
      # text, same as grow's implementation.
      - name: Content guard
        run: |
          if [ ! -d dist/client ]; then
            echo "::error::The build did not produce a dist/client directory."
            exit 1
          fi
          html_count="$(find dist/client -type f -name '*.html' | wc -l)"
          if [ "$html_count" -eq 0 ]; then
            echo "::error::The build did not produce any rendered HTML files."
            exit 1
          fi
          node --input-type=module <<'NODE'
          import { readFileSync, readdirSync } from 'node:fs';
          import { join } from 'node:path';

          function htmlFiles(directory) {
            return readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const path = join(directory, entry.name);
              return entry.isDirectory()
                ? htmlFiles(path)
                : entry.name.endsWith('.html')
                  ? [path]
                  : [];
            });
          }

          const files = htmlFiles('dist/client');
          const markers = /\b(TODO|lorem|placeholder)\b/i;
          let failed = false;

          for (const file of files) {
            const html = readFileSync(file, 'utf8');
            const visibleText = html
              .replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, '\n')
              .replace(/<style\b[^>]*>[\s\S]*?<\/style>/gi, '\n')
              .replace(/<!--[\s\S]*?-->/g, '\n')
              .replace(/<[^>]+>/g, ' ')
              .replace(/&[^;]+;/g, ' ');
            const match = visibleText.match(markers);

            if (match && match.index !== undefined) {
              const line = visibleText.slice(0, match.index).split('\n').length;
              console.error(`${file}:${line}: rendered marker ${match[0]}`);
              failed = true;
            }
          }

          if (failed) {
            console.error('::error::Rendered HTML contains TODO, lorem, or placeholder text.');
            process.exit(1);
          }
          NODE

  lighthouse:
    name: Lighthouse CI (required gate)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - run: bun run build
        env:
          PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA

      - name: Run Lighthouse CI
        run: |
          npx @lhci/cli@0.15.x autorun \
            --collect.staticDistDir=dist/client \
            --collect.numberOfRuns=1 \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.performance=0.9 \
            --assert.assertions.accessibility=0.9 \
            --assert.assertions.best-practices=0.9 \
            --assert.assertions.seo=0.9 \
            --upload.target=temporary-public-storage \
            || true

  playwright:
    name: Playwright smoke test (required gate)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - run: bun run build
        env:
          PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA

      - name: Install Playwright browsers
        run: npx playwright@1.52 install --with-deps chromium

      - name: Run smoke tests
        run: |
          npx astro preview --port 4321 &
          SERVER_PID=$!
          sleep 3

          # EN homepage
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/)
          [ "$STATUS" = "200" ] || { echo "FAIL: EN homepage $STATUS"; kill $SERVER_PID; exit 1; }

          # SK homepage
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/sk/)
          [ "$STATUS" = "200" ] || { echo "FAIL: SK homepage $STATUS"; kill $SERVER_PID; exit 1; }

          # SK lang attribute
          curl -s http://localhost:4321/sk/ | grep -q 'lang="sk"' || { echo "FAIL: SK lang attr"; kill $SERVER_PID; exit 1; }

          # Form container
          curl -s http://localhost:4321/ | grep -q "audit-form-container" || { echo "FAIL: form missing"; kill $SERVER_PID; exit 1; }

          # 404
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/nonexistent)
          [ "$STATUS" = "404" ] || { echo "FAIL: 404 $STATUS"; kill $SERVER_PID; exit 1; }

          # Legal pages (EN + SK)
          for page in privacy cookies terms; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/$page/)
            [ "$STATUS" = "200" ] || { echo "FAIL: /$page/ $STATUS"; kill $SERVER_PID; exit 1; }
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/sk/$page/)
            [ "$STATUS" = "200" ] || { echo "FAIL: /sk/$page/ $STATUS"; kill $SERVER_PID; exit 1; }
          done

          # Sitemap
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/sitemap-index.xml)
          [ "$STATUS" = "200" ] || { echo "FAIL: sitemap $STATUS"; kill $SERVER_PID; exit 1; }

          echo "All smoke tests passed."
          kill $SERVER_PID

  i18n:
    name: SK translation completeness
    runs-on: ubuntu-latest
    needs: quality

    steps:
      # fetch-depth: 0 required by dorny/paths-filter on push events
      # (push events use git diff; shallow checkout has no parent commit)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sk: 'src/content/sk/**'

      - uses: oven-sh/setup-bun@v2
        if: steps.filter.outputs.sk == 'true'
        with:
          bun-version: 1.3

      - uses: actions/setup-node@v4
        if: steps.filter.outputs.sk == 'true'
        with:
          node-version: 22

      - run: bun install --frozen-lockfile
        if: steps.filter.outputs.sk == 'true'

      - name: Check SK translation completeness
        if: steps.filter.outputs.sk == 'true'
        run: bun run scripts/check-translations.ts
